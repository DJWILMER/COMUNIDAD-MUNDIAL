  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player Pro</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Iconos de FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-default">

    <!-- Elemento de audio (oculto) -->
    <audio id="audio-player" preload="none"></audio>

    <!-- Fondo animado -->
    <div class="animated-bg"></div>

    <div class="mobile-container">
        
        <!-- Menú Lateral Deslizante -->
        <nav id="side-menu" class="side-menu">
            <div class="menu-header">
                <h3>MENÚ</h3>
                <button id="close-menu" class="close-btn"><i class="fas fa-times"></i></button>
            </div>
            <ul class="menu-links">
                <li><a href="#"><i class="fas fa-home"></i> Inicio</a></li>
                <li><a href="#"><i class="fas fa-calendar-alt"></i> Programación</a></li>
                <li><a href="#"><i class="fas fa-microphone"></i> Podcast</a></li>
            </ul>
            
            <!-- Selector de Temas -->
            <div class="theme-selector">
                <h4>Temas de Color:</h4>
                <div class="theme-buttons">
                    <button class="theme-btn bg-red" onclick="setTheme('theme-default')"></button>
                    <button class="theme-btn bg-blue" onclick="setTheme('theme-blue')"></button>
                    <button class="theme-btn bg-green" onclick="setTheme('theme-green')"></button>
                    <button class="theme-btn bg-purple" onclick="setTheme('theme-purple')"></button>
                </div>
            </div>
        </nav>

        <!-- Encabezado -->
        <header class="header">
            <div class="logo">PODER QUE <br>SE SIENTE</div>
            <div class="menu" id="open-menu">
                MENÚ <span class="accent-bar"></span>
            </div>
        </header>

        <!-- Directorio de Radios (Horizontal Scroll) -->
        <div class="directory-section">
            <div class="directory-header">
                <h3 class="directory-title">Directorio de Radios</h3>
                <button id="open-add-modal" class="add-radio-btn"><i class="fas fa-plus"></i></button>
            </div>
            <div class="radio-list" id="radio-list">
                <!-- Las radios se inyectan aquí con JavaScript -->
            </div>
        </div>

        <!-- Contenido Principal -->
        <div class="content-wrapper">
            
            <!-- Sección de Locutor -->
            <section class="locutor-section">
                <div class="locutor-img">
                    <img id="locutor-img" src="" alt="Locutor">
                </div>
                <div class="locutor-info">
                    <span class="subtitle"><span class="accent-bar"></span> LOCUTOR</span>
                    <h2 class="name" id="locutor-name">Cargando...</h2>
                </div>
            </section>

            <!-- Tarjeta del Programa -->
            <section class="show-card">
                <div class="show-img-container">
                    <img id="show-img" src="" alt="Estudio" class="show-img">
                </div>
                <div class="show-details">
                    <h1 class="show-title"><span class="accent-bar"></span> <span id="show-name">Cargando...</span></h1>
                    <p class="show-time" id="show-time">--:-- - --:--</p>
                </div>
            </section>

            <!-- Controles del Reproductor -->
            <div class="player-controls">
                <div class="loading-spinner" id="loading-spinner" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
                <button id="play-btn" class="play-btn">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>
            </div>

            <!-- Tarjeta de WhatsApp -->
            <div class="whatsapp-card" id="whatsapp-btn">
                <div class="wa-icon-box"><i class="fab fa-whatsapp"></i></div>
                <div class="wa-text">
                    <h3>Escríbenos al WhatsApp</h3>
                    <p>Reportanos la sintonía o pide tu canción</p>
                </div>
            </div>
        </div>

        <!-- Redes Sociales a la Derecha -->
        <div class="social-right">
            <a href="https://web.facebook.com/DJCHOCHOBARWILMER" id="social-fb" class="social-btn" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/wilmerdelgadocieza/" id="social-ig" class="social-btn" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@djchochobarwilmer?_t=ZM-8xIdVLRK4tc&_r=1" id="social-x" class="social-btn" target="_blank"><strong>tik</strong></a>
            <a href="https://wilmerdelgadocieza.blogspot.com/" id="social-tk" class="social-btn" target="_blank"><strong>Web</strong></a>
        </div>
    </div>

    <!-- MODAL PARA AGREGAR NUEVA RADIO -->
    <div id="add-radio-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Agregar Nueva Radio</h2>
                <button class="close-modal-btn" id="close-add-modal"><i class="fas fa-times"></i></button>
            </div>
            <form id="add-radio-form">
                <input type="text" id="new-name" placeholder="Nombre de la Radio *" required>
                <input type="url" id="new-url" placeholder="URL del Streaming (Audio) *" required>
                <input type="url" id="new-logo" placeholder="URL del Logo (Opcional)">
                <input type="text" id="new-locutor" placeholder="Nombre del Locutor (Opcional)">
                <input type="number" id="new-wa" placeholder="WhatsApp (Ej: 51999999999)">
                <button type="submit" class="save-radio-btn">Guardar Radio</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
